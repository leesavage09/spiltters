services:
  postgres:
    image: postgres:16-alpine
    container_name: splitters-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: splitters
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: splitters-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/splitters?schema=public
    depends_on:
      - postgres
    command: sh -c "node dist/main.js"

volumes:
  postgres_data:
