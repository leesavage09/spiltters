services:
  postgres:
    image: postgres:16-alpine
    container_name: splitters-db
    restart: unless-stopped
    networks:
      - traefik-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: leesavage09/splitters
    container_name: splitters
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.payload.rule=Host(`splitters.exp.leesavage.co.uk`)'
      - 'traefik.http.routers.payload.entrypoints=websecure'
      - 'traefik.http.routers.payload.tls=true'
      - 'traefik.http.routers.payload.tls.certresolver=le'
      - 'traefik.http.services.payload.loadbalancer.server.port=3000'
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - postgres
    command: sh -c "node dist/main.js"

volumes:
  postgres_data:

networks:
  traefik-network:
    external: true
