name: CI/CD Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/splitters:latest
          docker build \
            --secret id=DATABASE_URL,env=DATABASE_URL \
            -f docker/Dockerfile -t $IMAGE_NAME .
          docker push $IMAGE_NAME
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      - name: Prepare remote directory
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 2222
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /home/dev/splitters
      - name: Copy docker/docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 2222
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker/docker-compose.yml
          target: /home/dev/splitters
      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: 2222
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/dev/splitters/docker
            # --- create temporary .env file with secrets ---
            cat > .env <<EOF
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            EOF
            # --- run Docker Compose with .env file ---          
            docker-compose pull
            docker-compose down && docker-compose up -d --remove-orphans
            docker system prune -f
